<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Profile — ElderEdge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Elder<span>Edge</span></a>
  <div class="nav-links">
    <a href="index.html">Find Mentors</a>
    <a href="ai_match.html">AI Match</a>
    <a href="signup.html">Become a Mentor</a>
    <a href="signup.html" class="nav-cta btn btn-sm">Join Free</a>
  </div>
</nav>

<div class="container" style="padding-top:2.5rem; padding-bottom:4rem;">

  <a href="index.html" class="btn btn-ghost btn-sm mb-3" style="display:inline-flex;">
    ← Back to mentors
  </a>

  <div id="profile-wrap" class="page-enter">
    <!-- Skeleton -->
    <div id="skeleton" style="display:grid; grid-template-columns:1fr 340px; gap:2rem; align-items:start;">
      <div>
        <div style="display:flex;gap:1.5rem;align-items:flex-start;margin-bottom:2rem">
          <div class="skeleton" style="width:88px;height:88px;border-radius:50%;flex-shrink:0"></div>
          <div style="flex:1">
            <div class="skeleton" style="height:24px;width:50%;margin-bottom:10px"></div>
            <div class="skeleton" style="height:14px;width:75%;margin-bottom:8px"></div>
            <div class="skeleton" style="height:14px;width:40%"></div>
          </div>
        </div>
        <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px"></div>
        <div class="skeleton" style="height:14px;width:90%;margin-bottom:8px"></div>
        <div class="skeleton" style="height:14px;width:80%"></div>
      </div>
      <div class="skeleton" style="height:280px;border-radius:14px"></div>
    </div>
  </div>

  <div id="profile-content" style="display:none;"></div>
</div>

<script src="utils.js"></script>
<script>
  const id = getParam("id");
  if (!id) window.location.href = "index.html";

  async function loadProfile() {
    try {
      const [mentor, reviews] = await Promise.all([
        apiFetch(`/mentors/${id}`),
        apiFetch(`/reviews/${id}`)
      ]);
      renderProfile(mentor, reviews);
    } catch {
      document.getElementById("profile-wrap").innerHTML = `
        <div class="empty-state">
          <div class="icon">⚠</div>
          <h3>Mentor not found</h3>
          <p>This mentor may no longer be available.</p>
          <a href="index.html" class="btn btn-primary mt-3">Back to search</a>
        </div>`;
    }
  }

  function renderProfile(m, reviews) {
    document.title = `${m.name} — ElderEdge`;
    document.getElementById("skeleton").style.display = "none";

    const avgStars = reviews.length
      ? (reviews.reduce((s, r) => s + r.stars, 0) / reviews.length).toFixed(1)
      : null;

    const langs = (m.languages || "English").split(",").map(l => l.trim());

    document.getElementById("profile-content").style.display = "grid";
    document.getElementById("profile-content").style.gridTemplateColumns = "1fr 320px";
    document.getElementById("profile-content").style.gap = "2rem";
    document.getElementById("profile-content").style.alignItems = "start";

    document.getElementById("profile-content").innerHTML = `
      <!-- Left column -->
      <div>
        <!-- Header -->
        <div style="display:flex;gap:1.5rem;align-items:flex-start;margin-bottom:2rem">
          <div style="position:relative">
            ${avatar(m)}
          </div>
          <div>
            <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;line-height:1.2;margin-bottom:6px">${m.name}</h1>
            <p style="color:var(--text-muted);margin-bottom:10px">${m.past_role}</p>
            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
              <span class="badge badge-accent">${m.domain}</span>
              <span class="badge badge-gray">📍 ${m.country}</span>
              ${avgStars ? `<span class="badge badge-gray">${renderStars(avgStars)} ${avgStars} (${reviews.length})</span>` : '<span class="badge badge-green">New mentor</span>'}
            </div>
          </div>
        </div>

        <!-- Bio -->
        <div class="card" style="padding:1.5rem;margin-bottom:1.5rem">
          <h3 style="font-family:'Playfair Display',serif;margin-bottom:12px">About</h3>
          <p style="color:var(--text-muted);line-height:1.75">${m.bio}</p>
        </div>

        <!-- Details -->
        <div class="card" style="padding:1.5rem;margin-bottom:1.5rem">
          <h3 style="font-family:'Playfair Display',serif;margin-bottom:16px">Details</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div>
              <div class="text-xs text-muted mb-1">Domain</div>
              <div class="text-sm">${m.domain}</div>
            </div>
            <div>
              <div class="text-xs text-muted mb-1">Country</div>
              <div class="text-sm">${m.country}</div>
            </div>
            <div>
              <div class="text-xs text-muted mb-1">Languages</div>
              <div style="display:flex;flex-wrap:wrap;gap:4px">
                ${langs.map(l => `<span class="badge badge-gray" style="font-size:0.72rem">${l}</span>`).join("")}
              </div>
            </div>
            <div>
              <div class="text-xs text-muted mb-1">Session length</div>
              <div class="text-sm">30 minutes</div>
            </div>
          </div>
        </div>

        <!-- Reviews -->
        <div>
          <h3 style="font-family:'Playfair Display',serif;margin-bottom:1rem">
            Reviews ${reviews.length ? `<span class="text-muted" style="font-size:0.9rem;font-weight:400">(${reviews.length})</span>` : ""}
          </h3>
          ${reviews.length ? reviews.map(r => `
            <div class="card" style="padding:1.25rem;margin-bottom:10px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <span style="font-weight:500">${r.mentee_name}</span>
                <span>${renderStars(r.stars)}</span>
              </div>
              <p class="text-sm text-muted">${r.comment}</p>
            </div>
          `).join("") : `
            <div class="card" style="padding:2rem;text-align:center;color:var(--text-muted)">
              <p>No reviews yet — be the first!</p>
            </div>
          `}

          <!-- Leave a review -->
          <div class="card" style="padding:1.5rem;margin-top:1.5rem">
            <h4 style="font-family:'Playfair Display',serif;margin-bottom:1rem">Leave a review</h4>
            <div style="display:flex;flex-direction:column;gap:12px">
              <div class="form-group">
                <label>Your name</label>
                <input id="rev-name" placeholder="e.g. Sofia M.">
              </div>
              <div class="form-group">
                <label>Rating</label>
                <div class="star-input" id="star-input">
                  ${[1,2,3,4,5].map(n => `<span onclick="setStar(${n})" data-star="${n}">★</span>`).join("")}
                </div>
              </div>
              <div class="form-group">
                <label>Comment</label>
                <textarea id="rev-comment" placeholder="How was your session?"></textarea>
              </div>
              <button class="btn btn-outline w-full" onclick="submitReview()">Submit review</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Booking card -->
      <div style="position:sticky;top:80px">
        <div class="card" style="padding:1.5rem">
          <div style="text-align:center;padding-bottom:1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem">
            <div style="font-size:2rem;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif">
              ${formatPrice(m)}
            </div>
            <div class="text-xs text-muted mt-1">per 30-min session</div>
            <div class="badge badge-green mt-2">First session free</div>
          </div>

          <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:1.25rem">
            <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-muted)">
              <span style="color:var(--green)">✓</span> 30-minute video session
            </div>
            <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-muted)">
              <span style="color:var(--green)">✓</span> Google Meet link on confirmation
            </div>
            <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-muted)">
              <span style="color:var(--green)">✓</span> Cancel anytime
            </div>
          </div>

          <a href="booking.html?id=${m.id}" class="btn btn-primary w-full" style="justify-content:center;">
            Book a session
          </a>
          <button class="btn btn-ghost w-full mt-2" style="justify-content:center;" onclick="bookFree()">
            Claim free first session
          </button>

          <div style="text-align:center;margin-top:1rem">
            <span class="text-xs text-muted">Speaks: ${langs.join(", ")}</span>
          </div>
        </div>
      </div>
    `;
  }

  let selectedStars = 0;
  function setStar(n) {
    selectedStars = n;
    document.querySelectorAll("#star-input span").forEach((s, i) => {
      s.classList.toggle("active", i < n);
    });
  }

  async function submitReview() {
    const name = document.getElementById("rev-name").value.trim();
    const comment = document.getElementById("rev-comment").value.trim();
    if (!name || !selectedStars || !comment) {
      showToast("Please fill in all fields and select a rating", "error"); return;
    }
    try {
      await apiFetch("/reviews", {
        method: "POST",
        body: JSON.stringify({ mentor_id: parseInt(id), mentee_name: name, stars: selectedStars, comment })
      });
      showToast("Review submitted! Thank you.");
      setTimeout(() => location.reload(), 1500);
    } catch { showToast("Failed to submit review", "error"); }
  }

  function bookFree() {
    window.location.href = `booking.html?id=${id}&free=1`;
  }

  loadProfile();
</script>
</body>
</html>
